<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>depsee</title>
    <link rel="stylesheet" href="styles.css" />
  </head>
  <body>
    <div id="app">
      <header class="toolbar">
        <h1>depsee</h1>
        <input
          type="file"
          id="sbom-file"
          class="visually-hidden"
          accept=".json,application/json"
        />
        <label for="sbom-file" class="toolbar-upload">Upload SBOM</label>
        <span id="zoom-level" class="zoom-level" aria-live="polite">100%</span>
        <span id="status" class="status">Loading…</span>
      </header>
      <div class="main-row">
        <div class="graph-shell">
          <div id="graph" aria-live="polite"></div>
          <div
            id="upload-overlay"
            class="upload-overlay"
            hidden
            role="progressbar"
            aria-valuemin="0"
            aria-valuemax="100"
            aria-valuenow="0"
            aria-label="SBOM upload progress"
          >
            <svg
              class="upload-ring-svg"
              viewBox="0 0 64 64"
              width="72"
              height="72"
              aria-hidden="true"
            >
              <circle class="upload-ring-track" cx="32" cy="32" r="26" />
              <circle
                class="upload-ring-fill"
                id="upload-ring-fill"
                cx="32"
                cy="32"
                r="26"
                transform="rotate(-90 32 32)"
              />
            </svg>
            <div id="upload-overlay-label" class="upload-overlay-label">
              0%
            </div>
          </div>
        </div>
        <aside id="detail" class="detail-panel" aria-live="polite" hidden></aside>
      </div>
      <footer class="nvd-footer">
        <span>
          This product uses data from the NVD API but is not endorsed or certified
          by the NVD.
        </span>
        <span>
          <a href="https://github.com/amvn-rwt/depsee" target="_blank">
            GitHub
          </a>
          <span>Made with ❤️ by <a href="https://github.com/amvn-rwt" target="_blank">amvn-rwt</a></span>
        </span>
      </footer>
    </div>
    <script type="module" src="./js/main.js"></script>
  </body>
</html>
