<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>depsee</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;500;600;700&display=swap"
      rel="stylesheet"
    />
    <link rel="stylesheet" href="styles.css" />
  </head>
  <body>
    <div id="app">
      <header class="toolbar">
        <h1>depsee</h1>
        <div class="toolbar-end" role="group" aria-label="Toolbar actions">
          <span id="zoom-level" class="zoom-level" aria-live="polite">100%</span>
          <span id="status" class="status">Loading…</span>
          <input
            type="file"
            id="sbom-file"
            class="visually-hidden"
            accept=".json,application/json"
          />
          <label for="sbom-file" class="toolbar-upload">Upload SBOM</label>
        </div>
      </header>
      <div class="main-row">
        <div class="graph-shell">
          <div id="graph" aria-live="polite"></div>
          <div
            id="upload-overlay"
            class="upload-overlay"
            hidden
            role="progressbar"
            aria-valuemin="0"
            aria-valuemax="100"
            aria-valuenow="0"
            aria-label="SBOM upload progress"
          >
            <svg
              class="upload-ring-svg"
              viewBox="0 0 64 64"
              width="72"
              height="72"
              aria-hidden="true"
            >
              <circle class="upload-ring-track" cx="32" cy="32" r="26" />
              <circle
                class="upload-ring-fill"
                id="upload-ring-fill"
                cx="32"
                cy="32"
                r="26"
                transform="rotate(-90 32 32)"
              />
            </svg>
            <div id="upload-overlay-label" class="upload-overlay-label">
              0%
            </div>
          </div>
        </div>
        <aside id="detail" class="detail-panel" aria-live="polite" hidden></aside>
      </div>
      <footer class="nvd-footer">
        <span class="nvd-footer-nvd">
          This product uses data from the NVD API but is not endorsed or certified
          by the NVD.
        </span>
        <div class="nvd-footer-links">
          <a
            class="nvd-footer-github"
            href="https://github.com/amvn-rwt/depsee"
            target="_blank"
            rel="noopener noreferrer"
            aria-label="View depsee on GitHub"
          >
            <svg
              class="nvd-footer-github-icon"
              viewBox="0 0 16 16"
              width="16"
              height="16"
              aria-hidden="true"
            >
              <path
                fill="currentColor"
                d="M8 0C3.58 0 0 3.58 0 8c0 3.54 2.29 6.53 5.47 7.59.4.07.55-.17.55-.38 0-.19-.01-.82-.01-1.49-2.01.37-2.53-.49-2.69-.94-.09-.23-.48-.94-.82-1.13-.28-.15-.68-.52-.01-.53.63-.01 1.08.58 1.23.82.72 1.21 1.87.87 2.33.66.07-.52.28-.87.51-1.07-1.78-.2-3.64-.89-3.64-3.95 0-.87.31-1.59.82-2.15-.08-.2-.36-1.02.08-2.12 0 0 .67-.21 2.2.82.64-.18 1.32-.27 2-.27.68 0 1.36.09 2 .27 1.53-1.04 2.2-.82 2.2-.82.44 1.1.16 1.92.08 2.12.51.56.82 1.27.82 2.15 0 3.07-1.87 3.75-3.65 3.95.29.25.54.73.54 1.48 0 1.07-.01 1.93-.01 2.2 0 .21.15.46.55.38A8.013 8.013 0 0016 8c0-4.42-3.58-8-8-8z"
              />
            </svg>
          </a>
          <span class="nvd-footer-by">
            Made with ❤️ by
            <a href="https://github.com/amvn-rwt" target="_blank" rel="noopener noreferrer">amvn-rwt</a>
          </span>
        </div>
      </footer>
    </div>
    <script type="module" src="./js/main.js"></script>
  </body>
</html>
