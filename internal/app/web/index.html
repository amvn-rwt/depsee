<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>depsee</title>
    <link rel="stylesheet" href="styles.css" />
  </head>
  <body>
    <div id="app">
      <header class="toolbar">
        <h1>depsee</h1>
        <input
          type="file"
          id="sbom-file"
          class="visually-hidden"
          accept=".json,application/json"
        />
        <label for="sbom-file" class="toolbar-upload">Upload SBOM</label>
        <span id="zoom-level" class="zoom-level" aria-live="polite">100%</span>
        <span id="status" class="status">Loading…</span>
      </header>
      <div class="main-row">
        <div id="graph" aria-live="polite"></div>
        <aside id="detail" class="detail-panel" aria-live="polite" hidden></aside>
      </div>
      <footer class="nvd-footer">
        <span>
          This product uses data from the NVD API but is not endorsed or certified
          by the NVD.
        </span>
        <span>
          <a href="https://github.com/amvn-rwt/depsee" target="_blank">
            GitHub
          </a>
          <span>Made with ❤️ by <a href="https://github.com/amvn-rwt" target="_blank">amvn-rwt</a></span>
        </span>
      </footer>
    </div>
    <script type="module" src="./js/main.js"></script>
  </body>
</html>
